<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Unicode 入力</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- apply the saved glyph font before first paint to avoid a flash -->
  <script>try{var f=localStorage.getItem('unicode-app:font:v1');if(f)document.documentElement.dataset.font=f;}catch(e){}</script>
</head>
<body>
  <div id="loading" class="loading">読み込み中…</div>

  <!-- 出力部 -->
  <section class="output-area" aria-label="出力部">
    <textarea id="output" rows="3" placeholder="ここに文字が入力されます。直接入力・編集もできます。"
              spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
    <div class="output-bar">
      <div class="btn-group">
        <button type="button" id="copy-btn" class="btn primary">⧉ コピー</button>
        <button type="button" id="paste-btn" class="btn" title="貼り付け">📋 貼り付け</button>
        <button type="button" id="del-btn"  class="btn" title="1字削除">⌫ 1字削除</button>
        <button type="button" id="clear-btn" class="btn" title="全削除">✖︎ 全消去</button>
        <button type="button" id="undo-btn" class="btn" title="元に戻す">↶ 元に戻す</button>
        <button type="button" id="redo-btn" class="btn" title="やり直す">↷ やり直す</button>
      </div>
      <span id="count" class="count"></span>
    </div>
  </section>

  <!-- 入力部 -->
  <section class="input-area" aria-label="入力部">
    <div class="mode-tabs" role="tablist">
      <button type="button" class="mode-tab active" data-mode="all" role="tab">符号表</button>
      <button type="button" class="mode-tab" data-mode="current" role="tab">入力内容</button>
      <button type="button" class="mode-tab" data-mode="history" role="tab">入力履歴</button>
      <button type="button" class="mode-tab" data-mode="fav" role="tab">マイリスト</button>
      <div class="font-toggle" role="group" aria-label="表示フォント">
        <span class="font-label">フォント</span>
        <button type="button" class="font-opt" data-font="system">システム</button>
        <button type="button" class="font-opt" data-font="noto">Noto</button>
      </div>
    </div>

    <div id="attr-legend" class="attr-legend"></div>

    <div id="panel-all" class="panel">
      <div id="block-header" class="block-header"></div>
      <div id="grid" class="grid"></div>
    </div>

    <div id="panel-current" class="panel" hidden>
      <div class="board-bar">
        <span class="board-hint">現在、出力欄で使われている文字（出現順）</span>
      </div>
      <div id="current-board" class="fav-board"></div>
    </div>

    <div id="panel-history" class="panel" hidden>
      <div class="board-bar">
        <span class="board-hint">最近入力した文字（新しい順）</span>
        <button type="button" id="clear-history" class="btn small">履歴をクリア</button>
      </div>
      <div id="history-board" class="fav-board"></div>
    </div>

    <div id="panel-fav" class="panel" hidden>
      <div id="fav-board" class="fav-board"></div>
    </div>
  </section>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal" hidden></div>

  <!-- コピー通知 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Unicode data: classic <script> assigning window.UNICODE_* (not fetched,
       so this works when index.html is opened directly as a local file). -->
  <script src="data/segments.js" defer></script>
  <script src="data/blocks.js" defer></script>
  <script src="data/categories.js" defer></script>
  <script src="data/block_names_ja.js" defer></script>

  <!-- App scripts: classic (non-module) so file:// works; defer preserves order. -->
  <script src="js/data.js" defer></script>
  <script src="js/menu.js" defer></script>
  <script src="js/output.js" defer></script>
  <script src="js/favorites.js" defer></script>
  <script src="js/history.js" defer></script>
  <script src="js/grid.js" defer></script>
  <script src="js/blocks.js" defer></script>
  <script src="js/modal.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
