<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Unicodepod Keyboard</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='%234cb8d2'/%3E%3Ctext x='32' y='45' font-family='system-ui,sans-serif' font-size='36' font-weight='700' fill='white' text-anchor='middle'%3EU%3C/text%3E%3C/svg%3E">
  <!-- PWA: installable + offline-capable when served from a real origin
       (see sw.js's guarded registration below -- file:// just skips all of
       this, since browsers refuse service workers there anyway). -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1fb39a">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Unicodepod">
  <link rel="stylesheet" href="css/styles.css">
  <!-- @font-face rules for bundled rare-script fonts (fonts/*.woff2); each
       has a unicode-range so the browser only downloads it when the "拡張"
       font mode is active AND a matching glyph is actually rendered. -->
  <link rel="stylesheet" href="css/fonts-extended.css">
  <!-- apply the saved glyph font before first paint to avoid a flash -->
  <script>try { var f = localStorage.getItem('unicode-app:font:v1'); if (f) document.documentElement.dataset.font = f; } catch (e) { }</script>
  <!-- apply the saved light/dark theme before first paint to avoid a flash;
       absent = follow the OS (see the prefers-color-scheme media query in
       css/styles.css) -->
  <script>try { var t = localStorage.getItem('unicode-app:theme:v1'); if (t) document.documentElement.dataset.theme = t; } catch (e) { }</script>
</head>

<body>
  <div id="loading" class="loading">読み込み中…</div>

  <!-- モバイル用トップバー（狭い画面でのみ表示。左右メニューをドロワーで開く） -->
  <div class="mobile-bar">
    <div class="mobile-bar-side mobile-bar-side-left">
      <button type="button" id="menu-left-toggle" class="mobile-bar-btn" aria-label="設定メニューを開く">☰</button>
      <button type="button" id="mobile-undo-redo-btn" class="mobile-bar-btn" aria-label="元に戻す/やり直す">↺</button>
    </div>
    <div class="mobile-bar-center">
      <div class="mobile-brand">
        <span class="mobile-brand-icon" aria-hidden="true">U</span>
        <span class="mobile-brand-title">Unicodepod Keyboard</span>
      </div>
      <span id="mobile-bar-count-slot" class="mobile-bar-count-slot"></span>
    </div>
    <div class="mobile-bar-side mobile-bar-side-right">
      <button type="button" id="mobile-mylist-btn" class="mobile-bar-btn" aria-label="出力欄の全文字をマイリストへ追加/削除">★</button>
      <button type="button" id="menu-right-toggle" class="mobile-bar-btn" aria-label="ブロック選択を開く">▦</button>
    </div>
  </div>
  <div id="drawer-backdrop" class="drawer-backdrop"></div>

  <div class="page">
    <!-- 左メニューゾーン -->
    <aside class="menu-zone menu-left">
      <button type="button" class="drawer-close" data-drawer="left" aria-label="閉じる">×</button>
      <span class="drawer-title">表示</span>
      <header class="site-header">
        <span class="site-icon" aria-hidden="true">U</span>
        <h1 class="site-title">Unicodepod Keyboard</h1>
      </header>
      <main class="menu-left-main">
        <div class="theme-toggle" role="group" aria-label="配色テーマ">
          <span class="font-label">テーマ</span>
          <button type="button" class="theme-opt" data-theme-opt="dark"><span class="theme-opt-icon" aria-hidden="true">🌙</span>ダーク</button>
          <button type="button" class="theme-opt" data-theme-opt="light"><span class="theme-opt-icon" aria-hidden="true">☀️</span>ライト</button>
        </div>
        <div class="font-toggle" role="group" aria-label="表示フォント">
          <span class="font-label">フォント</span>
          <button type="button" class="font-opt" data-font="system">システム</button>
          <button type="button" class="font-opt" data-font="noto">Noto</button>
          <button type="button" class="font-opt" data-font="extended"
            title="西夏文字・変体仮名など、希少スクリプト用フォントを同梱(約6MB)">拡張</button>
        </div>
        <div class="fav-highlight-toggle" role="group" aria-label="お気に入りハイライト">
          <span class="font-label">お気に入り強調</span>
          <button type="button" class="fav-highlight-opt" data-fav-highlight="off">OFF</button>
          <button type="button" class="fav-highlight-opt" data-fav-highlight="on">ON</button>
        </div>
        <div id="attr-legend" class="attr-legend"></div>
      </main>
      <div id="meta-description" class="meta-description">
        <a href="https://x.com/Unicode_pod">bot (X)</a><a href="https://github.com/Mikanixonable/UnicodepodKeyboard">コード (GitHub)</a>
      </div>


    </aside>

    <!-- 中央コンテンツゾーン -->
    <div class="content-zone">
      <!-- 出力部 -->
      <section class="output-area" aria-label="出力部">
        <button type="button" id="clear-btn" class="clear-circle-btn" title="全削除">×</button>
        <div class="ta-wrap">
          <textarea id="output" rows="8" placeholder="出力部" spellcheck="false" autocapitalize="off"
            autocomplete="off"></textarea>
        </div>
        <div class="output-bar">
          <div class="btn-group">
            <button type="button" id="copy-btn" class="btn" title="コピー"><span class="btn-icon">⧉</span><span class="btn-label">コピー</span></button>
            <button type="button" id="paste-btn" class="btn" title="貼付け"><span class="btn-icon">⧈</span><span class="btn-label">貼付け</span></button>
            <button type="button" id="caret-left-btn" class="btn" title="カーソルを左へ">←</button>
            <button type="button" id="caret-right-btn" class="btn" title="カーソルを右へ">→</button>
            <button type="button" id="caret-up-btn" class="btn" title="カーソルを上へ">↑</button>
            <button type="button" id="caret-down-btn" class="btn" title="カーソルを下へ">↓</button>
            <button type="button" id="del-btn" class="btn" title="1字削除">⌫</button>
            <button type="button" id="undo-btn" class="btn" title="元に戻す">↶</button>
            <button type="button" id="redo-btn" class="btn" title="やり直す">↷</button>
            <button type="button" id="output-add-mylist-btn" class="btn" title="出力欄の全文字をマイリストへ追加"><span class="btn-icon">★＋</span><span class="btn-label">全て追加</span></button>
            <button type="button" id="output-remove-mylist-btn" class="btn" title="出力欄の全文字をマイリストから削除"><span class="btn-icon">★－</span><span class="btn-label">全て削除</span></button>
          </div>
          <span id="count" class="count"></span>
        </div>
      </section>

      <!-- 入力部 -->
      <section class="input-area" aria-label="入力部">
        <div class="mode-tabs" role="tablist">
          <button type="button" class="mode-tab active" data-mode="all" role="tab">符号表</button>
          <button type="button" class="mode-tab" data-mode="current" role="tab">入力内容</button>
          <button type="button" class="mode-tab" data-mode="history" role="tab">入力履歴</button>
          <button type="button" class="mode-tab" data-mode="fav" role="tab">マイリスト</button>
          <button type="button" class="mode-tab" data-mode="art" role="tab">Unicode Art</button>
        </div>

        <div id="panel-all" class="panel">
          <div id="block-header" class="block-header"></div>
          <div id="grid" class="grid"></div>
        </div>

        <div id="panel-current" class="panel" hidden>
          <div class="board-bar">
            <span class="board-hint">現在、出力欄で使われている文字（出現順）</span>
          </div>
          <div id="current-board" class="fav-board"></div>
        </div>

        <div id="panel-history" class="panel" hidden>
          <div class="board-bar">
            <span class="board-hint">最近入力した文字（新しい順）</span>
            <button type="button" id="clear-history" class="btn small">履歴をクリア</button>
          </div>
          <div id="history-board" class="fav-board"></div>
        </div>

        <div id="panel-fav" class="panel" hidden>
          <div id="fav-board" class="fav-board"></div>
        </div>

        <div id="panel-art" class="panel" hidden>
          <div class="board-bar">
            <div class="mylist-picker">
              <select id="art-view-select" class="mylist-select"></select>
              <button type="button" id="art-mylist-add" class="btn small">＋ 作成</button>
              <button type="button" id="art-mylist-rename" class="btn small">名前変更</button>
              <button type="button" id="art-mylist-delete" class="btn small danger">削除</button>
              <button type="button" id="art-mylist-menu-btn" class="btn small">マイリスト操作</button>
            </div>
            <button type="button" id="save-art-btn" class="btn small">＋ 出力部を保存</button>
          </div>
          <div id="art-board" class="art-board"></div>
        </div>
      </section>
    </div>

    <!-- 右メニューゾーン -->
    <aside class="menu-zone menu-right">
      <button type="button" class="drawer-close" data-drawer="right" aria-label="閉じる">×</button>
      <span class="drawer-title">移動</span>
      <div id="jump-form-slot" class="jump-form-slot"></div>
      <div id="block-sidebar" class="block-sidebar"></div>
    </aside>
  </div>

  <!-- 詳細モーダル -->
  <div id="modal" class="modal" hidden></div>

  <!-- Unicode Art 編集モーダル -->
  <div id="art-edit-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-box" role="dialog" aria-modal="true" aria-label="作品を編集">
      <div class="modal-close-anchor">
        <button type="button" id="art-edit-close" class="modal-close" aria-label="閉じる">✕</button>
      </div>
      <h2 class="art-edit-title">作品を編集</h2>
      <textarea id="art-edit-textarea" class="art-edit-textarea" rows="6" spellcheck="false"></textarea>
      <div class="art-edit-actions">
        <button type="button" id="art-edit-save" class="btn primary">保存</button>
      </div>
    </div>
  </div>

  <!-- コピー通知 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Unicode data: classic <script> assigning window.UNICODE_* (not fetched,
       so this works when index.html is opened directly as a local file). -->
  <script src="data/segments.js" defer></script>
  <script src="data/blocks.js" defer></script>
  <script src="data/categories.js" defer></script>
  <script src="data/age.js" defer></script>
  <script src="data/block_names_ja.js" defer></script>

  <!-- App scripts: classic (non-module) so file:// works; defer preserves order. -->
  <script src="js/data.js" defer></script>
  <script src="js/menu.js" defer></script>
  <script src="js/colormode.js" defer></script>
  <script src="js/favhighlight.js" defer></script>
  <script src="js/blockfavorites.js" defer></script>
  <script src="js/urlstate.js" defer></script>
  <script src="js/output.js" defer></script>
  <script src="js/favorites.js" defer></script>
  <script src="js/history.js" defer></script>
  <script src="js/art.js" defer></script>
  <script src="js/artlists.js" defer></script>
  <script src="js/grid.js" defer></script>
  <script src="js/blocks.js" defer></script>
  <script src="js/modal.js" defer></script>
  <script src="js/app.js" defer></script>
  <!-- 'serviceWorker' in navigator is false under file:// (and in older
       browsers), so this simply no-ops there instead of throwing. -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* offline support is a bonus, not required */ });
      });
    }
  </script>
</body>

</html>
